workflows:

  # ════════════════════════════════════════════════════════════════
  # FINGENDA iOS - App Store Build
  # ════════════════════════════════════════════════════════════════
  ios-release:
    name: Fingenda iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      groups:
        - appstore_credentials
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.fingenda.app
      node: 20
      xcode: latest
      cocoapods: default
      vars:
        APP_DISPLAY_NAME: "Fingenda"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"

    cache:
      cache_paths:
        - $HOME/.npm
        - $CM_BUILD_DIR/node_modules
        - $HOME/Library/Caches/CocoaPods

    scripts:
      - name: Install Node dependencies
        script: |
          npm ci || npm install

      - name: Build web assets
        script: |
          node scripts/build.js

      - name: Create iOS platform if missing
        script: |
          if [ ! -f "$CM_BUILD_DIR/ios/App/Podfile" ]; then
            rm -rf "$CM_BUILD_DIR/ios"
            npx cap add ios
          fi

      - name: Sync Capacitor iOS project
        script: |
          npx cap sync ios

      - name: Configure iOS system actions
        script: |
          node scripts/generate-ios-system-actions-v2.js

      - name: Generate iOS app icons
        script: |
          node scripts/generate-ios-appicon.js

      - name: Apply iOS plist settings
        script: |
          APP_PLIST="$CM_BUILD_DIR/ios/App/App/Info.plist"

          add_or_set_plist_value() {
            local key="$1"
            local type="$2"
            local value="$3"

            /usr/libexec/PlistBuddy -c "Set :$key $value" "$APP_PLIST" \
              || /usr/libexec/PlistBuddy -c "Add :$key $type $value" "$APP_PLIST"
          }

          add_or_set_plist_value CFBundleDisplayName string "$APP_DISPLAY_NAME"
          add_or_set_plist_value CFBundleVersion string "$PROJECT_BUILD_NUMBER"
          add_or_set_plist_value MinimumOSVersion string "17.0"
          add_or_set_plist_value NSCameraUsageDescription string "Fingenda, fis ve fatura taramak icin kameraniza erisim istiyor."
          add_or_set_plist_value NSPhotoLibraryUsageDescription string "Fingenda, fis gorsellerini kaydetmek icin fotograf kutuphanenize erisim istiyor."
          add_or_set_plist_value NSFaceIDUsageDescription string "Fingenda, finansal verilerinizi korumak icin biyometrik kimlik dogrulama kullaniyor."
          add_or_set_plist_value UIViewControllerBasedStatusBarAppearance bool true
          add_or_set_plist_value UILaunchStoryboardName string "LaunchScreen"

          /usr/libexec/PlistBuddy -c "Delete :NSAppTransportSecurity" "$APP_PLIST" || true
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity dict" "$APP_PLIST"
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity:NSAllowsArbitraryLoads bool false" "$APP_PLIST"

          /usr/libexec/PlistBuddy -c "Delete :UISupportedInterfaceOrientations" "$APP_PLIST" || true
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations array" "$APP_PLIST"
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations:0 string UIInterfaceOrientationPortrait" "$APP_PLIST"

          /usr/libexec/PlistBuddy -c "Delete :CFBundleURLTypes" "$APP_PLIST" || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes array" "$APP_PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0 dict" "$APP_PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleTypeRole string Editor" "$APP_PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLName string com.fingenda.app.actions" "$APP_PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLSchemes array" "$APP_PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLSchemes:0 string fingenda" "$APP_PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLSchemes:1 string Fingenda" "$APP_PLIST"

          /usr/libexec/PlistBuddy -c "Delete :NSUserActivityTypes" "$APP_PLIST" || true
          /usr/libexec/PlistBuddy -c "Add :NSUserActivityTypes array" "$APP_PLIST"
          /usr/libexec/PlistBuddy -c "Add :NSUserActivityTypes:0 string com.fingenda.app.action.add-expense" "$APP_PLIST"
          /usr/libexec/PlistBuddy -c "Add :NSUserActivityTypes:1 string com.fingenda.app.action.add-income" "$APP_PLIST"
          /usr/libexec/PlistBuddy -c "Add :NSUserActivityTypes:2 string com.fingenda.app.action.quick-note" "$APP_PLIST"
          /usr/libexec/PlistBuddy -c "Add :NSUserActivityTypes:3 string com.fingenda.app.action.goal-contribution" "$APP_PLIST"
          /usr/libexec/PlistBuddy -c "Add :NSUserActivityTypes:4 string com.fingenda.app.action.today-summary" "$APP_PLIST"
          /usr/libexec/PlistBuddy -c "Add :NSUserActivityTypes:5 string com.fingenda.app.action.recent-expenses" "$APP_PLIST"
          /usr/libexec/PlistBuddy -c "Add :NSUserActivityTypes:6 string com.fingenda.app.action.fingo-brain" "$APP_PLIST"
          /usr/libexec/PlistBuddy -c "Add :NSUserActivityTypes:7 string com.fingenda.app.action.market" "$APP_PLIST"
          /usr/libexec/PlistBuddy -c "Add :NSUserActivityTypes:8 string com.fingenda.app.action.voice-add" "$APP_PLIST"
          /usr/libexec/PlistBuddy -c "Add :NSUserActivityTypes:9 string com.fingenda.app.action.receipt-scan" "$APP_PLIST"

      - name: Install CocoaPods dependencies
        script: |
          cd ios/App
          pod install

      - name: Set up code signing
        script: |
          xcode-project use-profiles

      - name: Build signed IPA
        script: |
          xcode-project build-ipa \
            --workspace "$CM_BUILD_DIR/$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        expire_build_submitted_for_review: true
        submit_to_app_store: false

  # ════════════════════════════════════════════════════════════════
  # FINGENDA iOS - TestFlight (Development Build)
  # ════════════════════════════════════════════════════════════════
